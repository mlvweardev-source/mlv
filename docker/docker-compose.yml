services:
  postgres:
    image: postgres:18
    container_name: mlv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlv
      POSTGRES_PASSWORD: mlv_secret
      POSTGRES_DB: mlv
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mlv']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    container_name: mlv-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
