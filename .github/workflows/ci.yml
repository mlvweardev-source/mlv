name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://mlv:mlv_secret@localhost:5432/mlv?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-test-secret-key

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: mlv
          POSTGRES_PASSWORD: mlv_secret
          POSTGRES_DB: mlv
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mlv"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @mlv/db db:generate

      # Turbo pipeline: build → migrate → seed (urutan otomatis dari dependency graph)
      - name: Build (turbo)
        run: pnpm turbo build

      - name: Migrate & Seed Database (turbo)
        run: pnpm turbo db:migrate db:seed

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm turbo test
